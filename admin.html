<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Administration — Dracarys Auto</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base/variables.css" />
  <link rel="stylesheet" href="css/pages/admin.css" />
  <link rel="icon" type="image/png" href="assets/images/logo.png" />
</head>
<body class="admin-body">

  <!-- Loading -->
  <div class="admin-loading" id="adminLoading">
    <div class="admin-loading__spinner"></div>
  </div>

  <!-- Header -->
  <header class="app-header">
    <div class="app-header__inner">
      <div style="display:flex;align-items:center;gap:.75rem">
        <a href="index.html" class="app-header__logo">
          <img src="assets/images/logo.png" alt="Dracarys Auto" width="32" height="32" />
          <span>Dracarys Auto</span>
        </a>
        <span class="app-header__badge">Admin</span>
      </div>
      <div class="app-header__actions">
        <button class="app-header__logout" id="logoutBtn">Déconnexion</button>
      </div>
    </div>
  </header>

  <!-- Layout principal (caché jusqu'à auth) -->
  <div class="admin-layout" id="adminLayout" hidden>

    <!-- ── Sidebar clients ── -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar__head">
        <p class="admin-sidebar__title">Clients</p>
        <div class="admin-search">
          <svg class="admin-search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
          </svg>
          <input type="search" class="admin-search__input" id="searchInput"
                 placeholder="Rechercher un client…" autocomplete="off" />
        </div>
      </div>

      <div class="admin-client-list" id="clientList">
        <p class="admin-clients-empty">Chargement…</p>
      </div>

      <div class="admin-sidebar__stats">
        <div class="admin-stat-mini">
          <div class="admin-stat-mini__val" id="statTotalClients">—</div>
          <div class="admin-stat-mini__lbl">Clients</div>
        </div>
        <div class="admin-stat-mini">
          <div class="admin-stat-mini__val" id="statTotalPrestations">—</div>
          <div class="admin-stat-mini__lbl">Prestations</div>
        </div>
      </div>
    </aside>

    <!-- ── Panel détail ── -->
    <main class="admin-panel" id="adminPanel">
      <div class="admin-panel__empty">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <p>Sélectionnez un client dans la liste pour gérer ses points et prestations.</p>
      </div>
    </main>

  </div>

  <!-- Toast -->
  <div class="admin-toast" id="adminToast" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
