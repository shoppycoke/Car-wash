<!-- Section: Avant / Après -->
<section class="ba" id="before-after">
  <div class="container">
    <div class="section-head animate-on-scroll">
      <span class="section-eyebrow">Le résultat parle</span>
      <h2 class="section-title">Avant <span class="text-accent">/</span> Après</h2>
      <p class="section-subtitle">Déplacez le curseur pour découvrir la différence.</p>
    </div>

    <div class="ba__slider animate-on-scroll" id="baSlider">
      <!-- REMPLACER : assets/images/before-after/before-1.jpg + after-1.jpg -->
      <img src="assets/images/before-after/after-1.jpg" alt="Après detailing" class="ba__img ba__img--after" />
      <div class="ba__before-wrap">
        <img src="assets/images/before-after/before-1.jpg" alt="Avant detailing" class="ba__img ba__img--before" />
      </div>
      <div class="ba__handle" id="baHandle">
        <div class="ba__handle-line"></div>
        <div class="ba__handle-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l-6-6 6-6M15 6l6 6-6 6"/></svg>
        </div>
      </div>
      <span class="ba__label ba__label--before">Avant</span>
      <span class="ba__label ba__label--after">Après</span>
    </div>
  </div>
</section>
