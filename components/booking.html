<!-- Section: Réservation -->

    <div class="booking__wrap animate-on-scroll">

      </div>
      <div class="booking__rea-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
        Paiement sur place
      </div>
      <div class="booking__rea-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg>
        Annulation flexible
      </div>
    </div>
