<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Mon espace fidélité — Dracarys Auto</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base/variables.css" />
  <link rel="stylesheet" href="css/pages/auth.css" />
  <link rel="icon" type="image/png" href="assets/images/logo.png" />
</head>
<body class="auth-body">

  <div class="auth-bg" aria-hidden="true">
    <div class="auth-bg__orb auth-bg__orb--1"></div>
    <div class="auth-bg__orb auth-bg__orb--2"></div>
  </div>

  <header class="app-header">
    <div class="app-header__inner">
      <a href="index.html" class="app-header__logo">
        <img src="assets/images/logo.png" alt="Dracarys Auto" width="32" height="32" />
        <span>Dracarys Auto</span>
      </a>
    </div>
  </header>

  <main class="auth-main">
    <div class="auth-card">

      <div class="auth-card__head">
        <img src="assets/images/logo.png" alt="" width="52" height="52" class="auth-card__logo" />
        <h1 class="auth-card__title">Mon espace fidélité</h1>
        <p class="auth-card__subtitle">Suivez vos points, réductions et prestations.</p>
      </div>

      <div class="auth-tabs" role="tablist">
        <button class="auth-tab is-active" data-tab="login"    role="tab" aria-selected="true">Connexion</button>
        <button class="auth-tab"           data-tab="register" role="tab" aria-selected="false">Inscription</button>
      </div>

      <div class="auth-alert" id="authAlert" role="alert" aria-live="polite" hidden></div>

      <!-- ===== CONNEXION ===== -->
      <form class="auth-form" id="loginForm" novalidate>

        <div class="auth-field">
          <label for="loginEmail">Adresse e-mail</label>
          <input type="email" id="loginEmail" name="email" autocomplete="email"
                 placeholder="vous@exemple.fr" required />
        </div>

        <div class="auth-field" id="loginPasswordField">
          <label for="loginPassword">
            Mot de passe
            <button type="button" class="auth-field__link" id="toggleMagicLink">
              Utiliser un lien magique
            </button>
          </label>
          <input type="password" id="loginPassword" name="password"
                 autocomplete="current-password" placeholder="••••••••" />
        </div>

        <div class="auth-magic-info auth-field" id="magicLinkInfo" hidden>
          <p class="auth-field__hint">
            Un lien de connexion vous sera envoyé par e-mail. Aucun mot de passe requis.
          </p>
          <button type="button" class="auth-field__link" id="togglePasswordLogin">
            Utiliser un mot de passe à la place
          </button>
        </div>

        <button type="submit" class="auth-submit btn--accent" id="loginBtn">
          Se connecter
        </button>
        <button type="button" class="auth-submit btn--ghost" id="magicLinkBtn" hidden>
          Envoyer le lien magique
        </button>
      </form>

      <!-- ===== INSCRIPTION ===== -->
      <form class="auth-form" id="registerForm" novalidate hidden>

        <div class="auth-field">
          <label for="regFullName">Nom complet <span class="required" aria-hidden="true">*</span></label>
          <input type="text" id="regFullName" name="full_name" autocomplete="name"
                 placeholder="Jean Dupont" required />
        </div>

        <div class="auth-field">
          <label for="regEmail">Adresse e-mail <span class="required" aria-hidden="true">*</span></label>
          <input type="email" id="regEmail" name="email" autocomplete="email"
                 placeholder="vous@exemple.fr" required />
        </div>

        <div class="auth-field">
          <label for="regPhone">
            Téléphone
            <span class="optional">(facultatif)</span>
          </label>
          <input type="tel" id="regPhone" name="telephone" autocomplete="tel"
                 placeholder="+33 6 00 00 00 00" />
        </div>

        <div class="auth-field">
          <label for="regPassword">Mot de passe <span class="required" aria-hidden="true">*</span></label>
          <input type="password" id="regPassword" name="password" autocomplete="new-password"
                 placeholder="8 caractères minimum" required minlength="8" />
        </div>

        <div class="auth-field">
          <label for="regCode">
            Code de parrainage
            <span class="optional">(facultatif)</span>
          </label>
          <input type="text" id="regCode" name="code_parrainage"
                 placeholder="XXXXXX" maxlength="6"
                 style="text-transform:uppercase;letter-spacing:0.15em" />
          <span class="auth-field__hint">Réduction accordée si le code est valide.</span>
        </div>

        <label class="auth-checkbox">
          <input type="checkbox" id="regRgpd" name="rgpd" required />
          <span class="auth-checkbox__box"></span>
          <span class="auth-checkbox__label">
            J'accepte la <a href="#" target="_blank">politique de confidentialité</a>
            et le traitement de mes données personnelles conformément au RGPD.
            <span class="required" aria-hidden="true">*</span>
          </span>
        </label>

        <button type="submit" class="auth-submit btn--accent" id="registerBtn">
          Créer mon compte
        </button>
      </form>

      <div class="auth-card__footer">
        <a href="index.html" class="auth-card__back">← Retour au site</a>
      </div>

    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
