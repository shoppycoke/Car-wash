<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Connexion — Dracarys Auto</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/base/variables.css" />
  <link rel="stylesheet" href="css/pages/auth.css" />
  <link rel="icon" type="image/png" href="assets/images/logo.png" />
</head>
<body class="ln-body">

  <!-- Fond animé -->
  <div class="ln-bg" aria-hidden="true">
    <div class="ln-bg__orb ln-bg__orb--1"></div>
    <div class="ln-bg__orb ln-bg__orb--2"></div>
    <div class="ln-bg__orb ln-bg__orb--3"></div>
    <div class="ln-bg__grid"></div>
  </div>

  <!-- Retour au site -->
  <a href="index.html" class="ln-back" aria-label="Retour au site Dracarys Auto">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
      <path d="M19 12H5M12 5l-7 7 7 7"/>
    </svg>
    <span>Dracarys Auto</span>
  </a>

  <!-- Contenu principal -->
  <main class="ln-main">
    <div class="ln-card">

      <!-- Marque -->
      <div class="ln-card__brand">
        <img src="assets/images/logo.png" alt="" width="46" height="46" class="ln-card__logo" />
        <div class="ln-card__brand-text">
          <span class="ln-card__brand-name">Dracarys Auto</span>
          <span class="ln-card__brand-tag">Espace fidélité</span>
        </div>
      </div>

      <!-- Titre -->
      <div class="ln-card__head">
        <h1 class="ln-card__title">Bon retour</h1>
        <p class="ln-card__sub">Accédez à votre espace personnel</p>
      </div>

      <!-- Alerte -->
      <div class="ln-alert" id="lnAlert" role="alert" aria-live="polite" hidden></div>

      <!-- Formulaire connexion -->
      <form class="ln-form" id="lnForm" novalidate>

        <div class="ln-field">
          <label class="ln-field__lbl" for="lnEmail">Adresse e-mail</label>
          <div class="ln-field__wrap">
            <svg class="ln-field__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="2" y="4" width="20" height="16" rx="2"/>
              <path d="M2 7l10 7 10-7"/>
            </svg>
            <input class="ln-field__input" type="email" id="lnEmail" name="email"
                   autocomplete="email" placeholder="vous@exemple.fr" required />
          </div>
        </div>

        <div class="ln-field">
          <div class="ln-field__row">
            <label class="ln-field__lbl" for="lnPassword">Mot de passe</label>
            <button type="button" class="ln-forgot" id="lnForgot">Mot de passe oublié ?</button>
          </div>
          <div class="ln-field__wrap">
            <svg class="ln-field__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input class="ln-field__input" type="password" id="lnPassword" name="password"
                   autocomplete="current-password" placeholder="••••••••" required />
            <button type="button" class="ln-field__eye" id="lnTogglePwd" aria-label="Afficher / masquer le mot de passe">
              <svg id="lnEyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
              <svg id="lnEyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" hidden>
                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
              </svg>
            </button>
          </div>
        </div>

        <button type="submit" class="ln-btn ln-btn--full" id="lnSubmit">
          <span class="ln-btn__label">Se connecter</span>
          <div class="ln-btn__spinner" aria-hidden="true"></div>
          <svg class="ln-btn__arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" aria-hidden="true">
            <path d="M5 12h14M12 5l7 7-7 7"/>
          </svg>
        </button>

      </form>

      <!-- Pied -->
      <div class="ln-card__footer">
        <p>Pas encore de compte ?&ensp;<a href="register.html" class="ln-link">Créer un compte</a></p>
      </div>

    </div>
  </main>

  <!-- Modal : mot de passe oublié -->
  <div class="ln-modal" id="lnModal" role="dialog" aria-modal="true" aria-labelledby="lnModalTitle" hidden>
    <div class="ln-modal__bg" id="lnModalBg"></div>
    <div class="ln-modal__box">
      <button class="ln-modal__close" id="lnModalClose" aria-label="Fermer">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <line x1="18" y1="6" x2="6" y2="18"/>
          <line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
      <div class="ln-modal__icon" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h2 id="lnModalTitle" class="ln-modal__title">Réinitialiser le mot de passe</h2>
      <p class="ln-modal__desc">Entrez votre adresse e-mail, nous vous enverrons un lien de réinitialisation.</p>
      <div class="ln-alert ln-alert--sm" id="lnModalAlert" role="alert" aria-live="polite" hidden></div>
      <div class="ln-field">
        <label class="ln-field__lbl" for="lnForgotEmail">Adresse e-mail</label>
        <div class="ln-field__wrap">
          <svg class="ln-field__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="2" y="4" width="20" height="16" rx="2"/>
            <path d="M2 7l10 7 10-7"/>
          </svg>
          <input class="ln-field__input" type="email" id="lnForgotEmail"
                 autocomplete="email" placeholder="vous@exemple.fr" />
        </div>
      </div>
      <button type="button" class="ln-btn ln-btn--full" id="lnForgotSubmit" style="margin-top:20px">
        <span class="ln-btn__label">Envoyer le lien</span>
        <div class="ln-btn__spinner" aria-hidden="true"></div>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
